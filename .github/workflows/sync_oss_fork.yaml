name: Sync Your Fork from OSS

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    # Company fork only: never run in OSS repo owned by ksharma20
    if: github.repository_owner != 'ksharma20'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Set upstream
        run: |
          git remote remove upstream || true
          git remote add upstream https://github.com/ksharma20/venzio.git
          git fetch upstream

      - name: Sync main
        run: |
          git checkout main
          git reset --hard upstream/main
          git push origin main --force

      # Optional: keep `develop` current by opening a PR from `main` → `develop`.
      # This supports the company workflow where:
      # - `main` is mirror-only (synced from OSS)
      # - all human PRs merge into `develop` (preview/staging)
      - name: Prepare sync branch (main → develop)
        id: prep_develop_pr
        run: |
          if git show-ref --verify --quiet refs/remotes/origin/develop; then
            git fetch origin
            git checkout -B sync/main-to-develop origin/develop
            if git merge --no-edit origin/main; then
              echo "has_develop=true" >> "$GITHUB_OUTPUT"
              echo "merge_ok=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_develop=true" >> "$GITHUB_OUTPUT"
              echo "merge_ok=false" >> "$GITHUB_OUTPUT"
              echo "Merge conflict: cannot auto-merge origin/main into origin/develop"
              exit 1
            fi
          else
            echo "has_develop=false" >> "$GITHUB_OUTPUT"
            echo "merge_ok=false" >> "$GITHUB_OUTPUT"
            echo "No origin/develop branch found. Skipping develop sync PR."
          fi

      - name: Create PR to sync main into develop
        if: steps.prep_develop_pr.outputs.has_develop == 'true' && steps.prep_develop_pr.outputs.merge_ok == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: develop
          branch: sync/main-to-develop
          title: "chore(sync): merge main into develop"
          labels: |
            sync
          body: |
            This PR keeps `develop` up to date with `main`.

            - `main` is synced from OSS `main` by automation
            - `develop` is the human PR target (preview/staging)
