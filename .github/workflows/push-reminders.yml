name: Push Reminders Cron

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  remind:
    if: ${{ secrets.CRON_SECRET != '' && secrets.APP_URL != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger push reminders
        run: |
          curl -sf -m 30 -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/push/cron"
